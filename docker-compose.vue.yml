version: '3.8'

services:
  # PHP backend service re‑used from the other compose file
  php:
    build:
      context: .
      dockerfile: Dockerfile
    image: laravel-sync-php
    container_name: laravel_sync_php_vue
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    environment:
      APP_ENV: local
      APP_DEBUG: 'true'
      APP_KEY: base64:changeme
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: laravel
      DB_USERNAME: root
      DB_PASSWORD: secret
    depends_on:
      - db
    command: bash -lc "composer install && php-fpm"

  node:
    image: node:18-alpine
    container_name: laravel_sync_node
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    ports:
      - "5173:5173" # vite dev server default port
    command: ["sh","-c","npm install && npm run dev"]
    environment:
      # optionally forward the API url to the php container
      VITE_API_BASE_URL: http://localhost:9000

  db:
    image: mysql:8.0
    container_name: laravel_sync_db_vue
    environment:
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_DATABASE: laravel
    volumes:
      - dbdata_vue:/var/lib/mysql
    ports:
      - "3306:3306"

volumes:
  dbdata_vue:
