version: '3.9'

services:

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: laravel_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - php_data:/var/www/html
    ports:
      - "8000:8000"
      - "5173:5173" # Vite
    depends_on:
      - postgres
      - redis
    networks:
      - app-network

  postgres:
    image: postgres:18.2
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: laravel
      POSTGRES_USER: laravel
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - app-network

  redis:
    image: redis:alpine
    container_name: redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    networks:
      - app-network

volumes:
  php_data:
  pgdata:
  redisdata:

networks:
  app-network:
    driver: bridge