services:
    app:
        build:
            context: .
            dockerfile: Dockerfile
        container_name: laravel_app
        restart: unless-stopped
        working_dir: /var/www/html

        volumes:
            - ./:/var/www/html

        ports:
            - '8000:8000'
            - '5173:5173'

        depends_on:
            - postgres
            - redis

        networks:
            - app-network

    postgres:
        image: postgres:16
        container_name: postgres
        restart: unless-stopped

        environment:
            POSTGRES_DB: laravel
            POSTGRES_USER: postgres
            POSTGRES_PASSWORD: postgres

        ports:
            - '5433:5432'

        volumes:
            - pgdata:/var/lib/postgresql

        networks:
            - app-network

    redis:
        image: redis:7-alpine
        container_name: redis
        restart: unless-stopped

        ports:
            - '6379:6379'

        volumes:
            - redisdata:/data

        networks:
            - app-network

volumes:
    pgdata:
    redisdata:

networks:
    app-network:
        driver: bridge
