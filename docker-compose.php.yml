version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: laravel-sync-php
    container_name: laravel_sync_php
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    ports:
      - "9000:9000" # expose php-fpm socket via TCP
    environment:
      APP_ENV: local
      APP_DEBUG: 'true'
      APP_KEY: base64:changeme
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: laravel
      DB_USERNAME: root
      DB_PASSWORD: secret
    depends_on:
      - db
    command: bash -lc "composer install && php-fpm"

  db:
    image: mysql:8.0
    container_name: laravel_sync_db
    environment:
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_DATABASE: laravel
    volumes:
      - dbdata:/var/lib/mysql
    ports:
      - "3306:3306"

volumes:
  dbdata:
